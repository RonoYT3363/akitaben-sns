<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>んだっす 0.3.0-dev</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topRight">
    <button id="accountBtn">アカウント作成</button>
</div>

<div id="container">

    <div id="leftMenu">
        <button onclick="showPage('homePage')">ホーム</button>
        <button onclick="showPage('loginPage')">ログイン</button>
        <button onclick="showPage('registerPage')">登録</button>
        <button onclick="showPage('profilePage')">プロフィール</button>
    </div>

    <div id="main">

        <!-- HOME -->
        <div id="homePage" class="page">
            <h2>ホーム</h2>

            <textarea
                id="postInput"
                placeholder="投稿..."
            ></textarea>

            <button
                class="postButton"
                onclick="addPost()"
            >
                投稿
            </button>

            <div id="posts"></div>
        </div>

        <!-- LOGIN -->
        <div
            id="loginPage"
            class="page"
            style="display:none;"
        >
            <h2>ログイン</h2>

            <input
                id="loginId"
                placeholder="ID"
            >

            <input
                id="loginPw"
                type="password"
                placeholder="PW"
            >

            <button onclick="login()">
                ログイン
            </button>
        </div>

        <!-- REGISTER -->
        <div
            id="registerPage"
            class="page"
            style="display:none;"
        >
            <h2>登録</h2>

            <input
                id="regId"
                placeholder="ID"
            >

            <input
                id="regName"
                placeholder="ニックネーム"
            >

            <input
                id="regPw"
                type="password"
                placeholder="PW"
            >

            <button onclick="register()">
                登録
            </button>
        </div>

        <!-- PROFILE -->
        <div
            id="profilePage"
            class="page"
            style="display:none;"
        >
            <h2>プロフィール</h2>

            <div id="profileInfo"></div>
        </div>

    </div>

</div>

<!-- Firebase -->
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot,
    getDocs,
    serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBrvljWUiy1qW1FpGi37Md0j7c73ZVvPfE",
    authDomain: "akitaben-socialmedia.firebaseapp.com",
    projectId: "akitaben-socialmedia",
    storageBucket: "akitaben-socialmedia.appspot.com",
    messagingSenderId: "1042795276573",
    appId: "1:1042795276573:web:e9f4c18963fd5adfd099f4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;

window.fs = {
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot,
    getDocs,
    serverTimestamp
};

</script>

<!-- script.js -->
<script src="script.js"></script>

</body>
</html>
